version: '3.8'

services:
  translator:
    build:
      context: .
      dockerfile: Dockerfile
    image: twi-chinese-translator:latest
    container_name: twi-translator
    ports:
      - "8501:8501"
    volumes:
      # Place your trained model files in ./models/ before running.
      # Required files:
      #   models/twi_chi_model_best.ckpt
      #   models/twi_chi.vocab.pickle
      #   models/twi_spm.model
      - ./models:/app/models:ro
    environment:
      # Model file location (inside the container)
      - MODEL_DIR=/app/models
      # Streamlit server settings
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLECORS=false
      - STREAMLIT_SERVER_ENABLEXSRFPROTECTION=false
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - STREAMLIT_CLIENT_TOOLBAR_MODE=viewer
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
